name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  playwright:
    name: Playwright Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Run Playwright tests
        run: npm run test
      - name: Upload Playwright HTML report
        if: always() && !cancelled()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
          if-no-files-found: ignore
      - name: Upload Allure raw results
        if: always() && !cancelled()
        uses: actions/upload-artifact@v5
        with:
          name: allure-results
          path: allure-results/
          retention-days: 30
          if-no-files-found: ignore

  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: playwright
    if: always() && !cancelled()
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: allure-results
          path: allure-results
          if-no-artifact-found: ignore
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Install dependencies
        run: npm ci
      - name: Generate Allure report
        shell: bash
        run: |
          if [[ -d allure-results ]] && [[ -n "$(ls -A allure-results 2>/dev/null)" ]]; then
            npm run allure:generate
          else
            echo "No Allure results; skip report generation"
          fi
      - name: Upload Allure HTML report
        if: always() && !cancelled()
        uses: actions/upload-artifact@v5
        with:
          name: allure-report
          path: allure-report/
          retention-days: 30
          if-no-files-found: ignore
      - name: Zip Allure report
        run: |
          if [[ -d allure-report ]]; then
            zip -r allure-report.zip allure-report
          fi
      - name: Send Allure HTML to Telegram
        if: always() && !cancelled()
        run: |
          FILE=$(find allure-report -name "*.html" | head -n 1)

          if [[ -f "$FILE" ]]; then
            curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
              -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
              -F document=@"$FILE" \
              -F caption="Allure report (run #${{ github.run_number }})"
          else
            echo "No HTML report found"
          fi